apiVersion: apps/v1
kind: Deployment
metadata:
  name: slick
  labels:
    app: slick
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slick
  template:
    metadata:
      labels:
        app: slick
    spec:
      containers:
      - name: slick
        image: slick/slick:latest
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: slick
spec:
  selector:
    app: slick
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
